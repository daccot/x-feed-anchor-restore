<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xフィード位置復元</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body {
      font-family: 'Inter', system-ui, sans-serif;
      width: 360px;
      margin: 0;
      background: #0a0a0a;
      color: #e7e9ea;
      padding: 20px;
    }
    h1 { font-size: 18px; margin: 0 0 8px; font-weight: 600; }
    p { font-size: 13px; color: #71767b; margin: 0 0 20px; }
    .section { margin-bottom: 24px; }
    label {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    label:hover { background: #1f2226; }
    input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #1d9bf0;
    }
    .slider {
      width: 100%;
      accent-color: #1d9bf0;
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      margin-top: 8px;
    }
    .primary { background: #1d9bf0; color: white; }
    .secondary { background: #2f3336; color: #e7e9ea; }
    .danger { background: #f4212e; color: white; }
    select, input[type="number"] {
      background: #16181c;
      color: #e7e9ea;
      border: 1px solid #2f3336;
      border-radius: 8px;
      padding: 8px;
      width: 100%;
    }
    #status {
      margin-top: 12px;
      color: #1d9bf0;
      font-size: 13px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h1>Xフィード位置復元</h1>
  <p>アンカー方式で快適に位置を記憶・復元</p>

  <div class="section">
    <label><input type="checkbox" id="autoRestore"> 自動復元（リロード時）</label>
    <label><input type="checkbox" id="showButton"> フローティングボタンを表示</label>
    <label><input type="checkbox" id="enableHome"> ホームタイムライン</label>
    <label><input type="checkbox" id="enableSearch"> 検索ページ</label>
    <label><input type="checkbox" id="enableLists"> リスト</label>
    <label><input type="checkbox" id="debug"> デバッグログ（開発用）</label>
  </div>

  <div class="section">
    <label>履歴保持数 <input type="number" id="historyLimit" min="5" max="50" style="width:70px;"></label>
  </div>

  <div class="section">
    <label>言語
      <select id="language">
        <option value="auto">自動</option>
        <option value="ja">日本語</option>
        <option value="en">English</option>
      </select>
    </label>
  </div>

  <button class="primary" id="save">設定を保存</button>
  <button class="secondary" id="copyLogs">ログをコピー</button>
  <button class="secondary" id="clearLogs">ログをクリア</button>
  <button class="danger" id="clear">保存位置をすべてクリア</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
