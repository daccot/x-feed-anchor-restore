<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>X Feed Anchor Restore</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <h1 data-i18n="popupTitle">X Feed Anchor Restore</h1>
    <p class="lead" data-i18n="popupLead">Save and restore feed position using tweet anchors.</p>

    <section>
      <label><input type="checkbox" id="autoRestore"> <span data-i18n="autoRestore">Auto restore</span></label>
      <label><input type="checkbox" id="showButton"> <span data-i18n="showButton">Show floating button</span></label>
      <label><input type="checkbox" id="enableHome"> <span data-i18n="enableHome">Home timeline</span></label>
      <label><input type="checkbox" id="enableSearch"> <span data-i18n="enableSearch">Search pages</span></label>
      <label><input type="checkbox" id="enableLists"> <span data-i18n="enableLists">Lists</span></label>
      <label><input type="checkbox" id="enableOtherTimelines"> <span data-i18n="enableOtherTimelines">Other timelines</span></label>
      <label><input type="checkbox" id="debug"> <span data-i18n="debug">Debug logs</span></label>
    </section>

    <section class="row">
      <label for="historyLimit" data-i18n="historyLimit">History limit</label>
      <input type="number" id="historyLimit" min="1" max="50">
    </section>

    <section class="row">
      <label for="language" data-i18n="language">Language</label>
      <select id="language">
        <option value="auto">auto</option>
        <option value="ja">日本語</option>
        <option value="en">English</option>
      </select>
    </section>

    <section class="actions">
      <button id="save" data-i18n="save">Save</button>
      <button id="clear" data-i18n="clear">Clear saved positions</button>
    </section>

    <p id="status" role="status"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
